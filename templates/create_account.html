<!DOCTYPE html>
<html>
<head>
    <title>Create Account - First Standard Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }
        .btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #764ba2;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Create New Account</h1>
        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>
        
        <form id="createForm">
            <div class="form-group">
                <label for="owner">Owner Name:</label>
                <input type="text" id="owner" name="owner" required>
            </div>
            <div class="form-group">
                <label for="balance">Initial Balance ($):</label>
                <input type="number" id="balance" name="initial_balance" value="0" min="0" step="0.01">
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <div class="back-link">
            <a href="{{ url_for('index') }}">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const owner = document.getElementById('owner').value;
            const balance = document.getElementById('balance').value;
            
            try {
                const response = await fetch('{{ url_for("create_account") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        owner: owner,
                        initial_balance: balance
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const successMsg = document.getElementById('successMsg');
                    successMsg.textContent = `Account created successfully! Account Number: ${data.account_number}`;
                    successMsg.style.display = 'block';
                    
                    document.getElementById('createForm').reset();
                    document.getElementById('balance').value = '0';
                    
                    setTimeout(() => {
                        window.location.href = '{{ url_for("index") }}';
                    }, 2000);
                } else {
                    const errorMsg = document.getElementById('errorMsg');
                    errorMsg.textContent = data.error || 'Failed to create account';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = 'Error: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
